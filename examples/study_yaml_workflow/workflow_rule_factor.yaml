# 学习用：规则因子 + qrun 标准流水线（FactorColumnModel + StudyAlpha158）。
# 运行目录：本文件所在目录。命令：python -m qlib.cli.run workflow_rule_factor.yaml
# （qlib/cli/run.py 已按 UTF-8 读入，Windows 下可使用中文注释。）
#
# 与 benchmarks/Linear/workflow_config_linear_Alpha158.yaml 的差异：
#   task.model → FactorColumnModel（指定特征列作为预测）
#   task.dataset.handler → StudyAlpha158（Alpha158 外加一列 MA_TREND_5_20）

qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn

sys:
    rel_path: ["."]

experiment_name: study_rule_factor

market: &market csi300
benchmark: &benchmark SH000300

data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 30
            n_drop: 5
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: FactorColumnModel
        module_path: mylib.model
        kwargs:
            feature_col: MA_TREND_5_20
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: StudyAlpha158
                module_path: mylib.handler
                kwargs: *data_handler_config
            segments:
                train: [2008-01-01, 2014-12-31]
                valid: [2015-01-01, 2016-12-31]
                test: [2017-01-01, 2020-08-01]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: true
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
